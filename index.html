<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VetCare AI — المساعد البيطري الذكي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bd:#0a2342;--bm:#1a4a8a;--b:#1e6bb8;--bl:#3d8dd9;--bp:#e8f2fc;--b50:#f0f7ff;
  --t:#0d9488;--tl:#ccfbf1;
  --bg:#f0f5fc;--text:#0a1929;--muted:#4a6080;--border:#c5d8f0;
}
body{
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:16px;
  background-image:radial-gradient(circle at 5% 10%,rgba(30,107,184,.08) 0%,transparent 40%),radial-gradient(circle at 95% 90%,rgba(13,148,136,.06) 0%,transparent 40%);
}
.wrap{width:100%;max-width:860px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 4px 16px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--bm),var(--bl));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 12px rgba(30,107,184,.3)}
.logo-text h1{font-size:18px;font-weight:700;color:var(--bd);font-family:'Cairo',sans-serif}
.logo-text p{font-size:12px;color:var(--muted);margin-top:1px;font-family:'Cairo',sans-serif}
.lang-sw{display:flex;gap:3px;background:white;border-radius:22px;padding:4px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(10,35,66,.06)}
.lbtn{padding:5px 16px;border-radius:18px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:'Cairo',sans-serif;color:var(--muted);background:transparent;transition:all .2s}
.lbtn.on{background:var(--b);color:white;box-shadow:0 2px 8px rgba(30,107,184,.35)}
.card{background:white;border-radius:24px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(10,35,66,.12);display:flex;flex-direction:column;height:660px;overflow:hidden}
.hdr{background:linear-gradient(135deg,var(--bd) 0%,var(--bm) 60%,var(--b) 100%);padding:18px 22px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.hdr-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hdr-name{font-size:17px;font-weight:700;color:white;font-family:'Cairo',sans-serif}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;display:flex;align-items:center;gap:6px;font-family:'Cairo',sans-serif}
.pulse{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:rip 2s infinite;flex-shrink:0}
@keyframes rip{0%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.chips{display:flex;gap:8px;margin-left:auto}
.chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.85);font-weight:600;font-family:'Cairo',sans-serif}
.qa-wrap{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--b50);display:flex;gap:7px;overflow-x:auto;flex-shrink:0}
.qa-wrap::-webkit-scrollbar{display:none}
.qa-btn{white-space:nowrap;padding:7px 15px;border:1px solid var(--border);border-radius:22px;font-size:13px;font-weight:600;color:var(--bm);cursor:pointer;background:white;transition:all .18s;flex-shrink:0;font-family:'Cairo',sans-serif;box-shadow:0 1px 4px rgba(10,35,66,.06)}
.qa-btn:hover{background:var(--b);color:white;border-color:var(--b);box-shadow:0 4px 12px rgba(30,107,184,.25);transform:translateY(-1px)}
.msgs{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:5px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;align-items:flex-start;gap:10px;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.mav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg.bot .mav{background:linear-gradient(135deg,var(--bp),#dbeafe);border:1px solid var(--border)}
.msg.user .mav{background:linear-gradient(135deg,#e0f2fe,var(--tl));border:1px solid #b2e0f7}
.bbl{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.9;font-family:'Cairo',sans-serif}
.msg.bot .bbl{background:var(--b50);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text)}
.msg.user .bbl{background:linear-gradient(135deg,var(--b),var(--bl));color:white;border-top-right-radius:4px;box-shadow:0 4px 14px rgba(30,107,184,.25)}
.tag{display:inline-block;font-size:12px;padding:3px 12px;border-radius:10px;margin-bottom:8px;font-weight:700;background:var(--bp);color:var(--bm);border:1px solid var(--border);font-family:'Cairo',sans-serif}
.tag.teal{background:var(--tl);color:var(--t);border-color:#99f6e4}
.typing{display:flex;gap:5px;align-items:center;padding:14px 16px}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--bl);animation:bl 1.3s infinite}
.typing span:nth-child(2){animation-delay:.22s}
.typing span:nth-child(3){animation-delay:.44s}
@keyframes bl{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.inp-wrap{padding:14px 16px;border-top:1px solid var(--border);background:var(--b50);display:flex;gap:10px;align-items:flex-end}
.inp-wrap textarea{flex:1;resize:none;border:1.5px solid var(--border);border-radius:14px;padding:11px 16px;font-size:14px;font-family:'Cairo',sans-serif;min-height:46px;max-height:120px;background:white;color:var(--text);outline:none;line-height:1.6;transition:border-color .2s,box-shadow .2s}
.inp-wrap textarea:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(30,107,184,.1)}
.inp-wrap textarea::placeholder{color:#94aec8;font-family:'Cairo',sans-serif}
.send{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--b),var(--bl));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:0 4px 12px rgba(30,107,184,.35)}
.send:hover{transform:scale(1.06)}
.send:active{transform:scale(.96)}
.send svg{width:18px;height:18px;fill:white}
@media(max-width:600px){body{padding:8px}.card{height:93vh;border-radius:16px}.chips{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <div class="logo-text">
        <h1>VetCare AI</h1>
        <p>المساعد البيطري الذكي · Powered by Groq AI</p>
      </div>
    </div>
    <div class="lang-sw">
      <button class="lbtn on" id="btn-ar" onclick="setLang('ar')">عربي</button>
      <button class="lbtn"    id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="card">
    <div class="hdr">
      <div class="hdr-av">⚕️</div>
      <div style="flex:1">
        <div class="hdr-name" id="hname">د. بيطري — المساعد الذكي</div>
        <div class="hdr-sub"><span class="pulse"></span><span id="hsub">متصل الآن · مساعدك البيطري الشخصي</span></div>
      </div>
      <div class="chips">
        <div class="chip">🐾 24/7</div>
        <div class="chip">⚡ Groq AI</div>
      </div>
    </div>
    <div class="qa-wrap">
      <button class="qa-btn" onclick="quickAsk(T.q1)">📅 <span class="ql" data-k="q1"></span></button>
      <button class="qa-btn" onclick="quickAsk(T.q2)">📋 <span class="ql" data-k="q2"></span></button>
      <button class="qa-btn" onclick="quickAsk(T.q3)">💊 <span class="ql" data-k="q3"></span></button>
      <button class="qa-btn" onclick="quickAsk(T.q4)">💬 <span class="ql" data-k="q4"></span></button>
      <button class="qa-btn" onclick="quickAsk(T.q5)">🔔 <span class="ql" data-k="q5"></span></button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inp-wrap">
      <textarea id="ui" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
let lang='ar',hist=[];
const TX={
  ar:{ph:'اكتب رسالتك هنا...',hn:'د. بيطري — المساعد الذكي',hs:'متصل الآن · مساعدك البيطري الشخصي',
    q1:'حجز موعد',q2:'تلخيص حالة',q3:'جرعة دواء',q4:'أسئلة عميل',q5:'تذكيرات اليوم',
    welcome:`<span class="tag">🏥 أهلاً دكتور</span><br>أنا مساعدك البيطري الذكي — يشرفني أكون معاك!<br><br>📅 <b>تسجيل مواعيد</b> المرضى وتنظيمها<br>📋 <b>تلخيص الحالات</b> الطبية بشكل احترافي<br>💊 <b>جرعات الأدوية</b> حسب الوزن والنوع<br>💬 <b>الرد على أصحاب</b> الحيوانات بوضوح<br><br>بتكلم بالعربي أو الإنجليزي — أنا فاهمك 🐶🐱🐰`,
    err:'عذراً، خطأ في الاتصال. تأكد إن السيرفر شغال وحاول تاني.'},
  en:{ph:'Type your message here...',hn:'Vet AI — Smart Assistant',hs:'Online · Your personal vet assistant',
    q1:'Book Appt',q2:'Summarize Case',q3:'Drug Dosage',q4:'Client Q&A',q5:"Today's Reminders",
    welcome:`<span class="tag teal">🏥 Hello Doctor</span><br>I'm your smart vet assistant — happy to help!<br><br>📅 <b>Appointments</b> scheduling and records<br>📋 <b>Case summaries</b> structured format<br>💊 <b>Drug dosages</b> by weight and species<br>💬 <b>Client Q&A</b> clear answers<br><br>Arabic or English — I understand both 🐶🐱🐰`,
    err:'Connection error. Make sure the server is running and try again.'}
};
const T=new Proxy({},{get:(_,k)=>TX[lang][k]});
function setLang(l){
  lang=l;
  document.getElementById('btn-ar').className='lbtn'+(l==='ar'?' on':'');
  document.getElementById('btn-en').className='lbtn'+(l==='en'?' on':'');
  document.getElementById('hname').textContent=TX[l].hn;
  document.getElementById('hsub').textContent=TX[l].hs;
  document.getElementById('ui').placeholder=TX[l].ph;
  document.querySelectorAll('.ql').forEach(e=>{e.textContent=TX[l][e.dataset.k]});
  document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.documentElement.setAttribute('lang',l);
}
function addMsg(r,html){
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg '+r;
  const icon=r==='bot'?'⚕️':'👨‍⚕️';
  d.innerHTML=`<div class="mav">${icon}</div><div class="bbl">${html}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function showTyping(){
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg bot';d.id='typ';
  d.innerHTML=`<div class="mav">⚕️</div><div class="bbl"><div class="typing"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')}
async function send(){
  const inp=document.getElementById('ui'),txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  const messages=hist.map(m=>({role:m.role,content:m.content}));
  messages.push({role:'user',content:txt});
  hist.push({role:'user',content:txt});
  addMsg('user',txt);showTyping();
  try{
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages})});
    const data=await r.json();
    const reply=data.choices?.[0]?.message?.content||T.err;
    hist.push({role:'assistant',content:reply});
    removeTyping();addMsg('bot',fmt(reply));
  }catch(e){removeTyping();addMsg('bot',T.err);}
}
function quickAsk(q){document.getElementById('ui').value=q;send();}
setLang('ar');
addMsg('bot',TX.ar.welcome);
</script>
</body>
</html>
